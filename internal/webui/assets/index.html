<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>News</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<style>
  html,body{margin:0;height:100%;overflow:hidden;background:#f3f3f3}
  #screen{display:block;width:100vw;height:100vh;touch-action:none}
</style></head>
<body>
<canvas id="screen"></canvas>
<script src="/wasm_exec.js"></script>
<script>
  const go = new Go();
  WebAssembly.instantiateStreaming(fetch("/reader.wasm"), go.importObject)
    .then(r => go.run(r.instance))
    .catch(e => document.body.innerHTML = "<pre>"+e+"</pre>");
</script>
</body></html>
